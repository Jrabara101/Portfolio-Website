<script>
        function toggleCard(cardElement) {
            const isActive = cardElement.classList.contains('card-active');
            
            // Remove active class from all cards
            document.querySelectorAll('.card-fan-item').forEach(card => {
                card.classList.remove('card-active');
            });
            
            // If the clicked card wasn't active, make it active
            if (!isActive) {
                cardElement.classList.add('card-active');
            }
        }

        // Close active card when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.card-fan-item')) {
                document.querySelectorAll('.card-fan-item').forEach(card => {
                    card.classList.remove('card-active');
                });
            }
        }, true);
    </script>
