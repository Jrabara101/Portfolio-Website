    body {

    }
    .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    .glass-card:hover {
        border: 1px solid rgba(0, 219, 233, 0.4);
        background: rgba(255, 255, 255, 0.07);
        transform: translateY(-4px);
    }
    .spotlight-glow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: -1;
        background: radial-gradient(circle 600px at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(0, 219, 233, 0.06), transparent 80%);
    }
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
    }
    
    /* Expanded Stage Overlay Styling */
    #expansionStage {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #expansionStage.active {
        opacity: 1;
        pointer-events: auto;
    }
    #expansionStage .stage-content {
        transform: scale(0.95);
        opacity: 0;
        transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #expansionStage.active .stage-content {
        transform: scale(1);
        opacity: 1;
    }
    .preview-iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: #ffffff;
    }
    
    /* Card Grid items animation */
    .gallery-card {
        opacity: 0;
        transform: scale(0.95);
        animation: cardAppear 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes cardAppear {
        to {
            opacity: 1;
            transform: scale(1);
        }
    }
  </style>

    // Render Cards in Grid
    function renderCardGrid(items) {
      const grid = document.getElementById('projects-grid');
      grid.innerHTML = '';

      if (items.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full py-16 text-center text-on-surface-variant/40">
            <span class="material-symbols-outlined text-4xl block mb-2">search_off</span>
            <p class="font-body-lg">No playground cards match your query.</p>
          </div>
        `;
        return;
      }

      items.forEach((proj, index) => {
        const card = document.createElement('div');
        card.className = 'gallery-card glass-card rounded-xl overflow-hidden p-1 flex flex-col group cursor-pointer';
        card.style.animationDelay = `${index * 0.03}s`;
        card.onclick = () => expandCard(proj.day);

        const paddedDay = proj.day < 10 ? `0${proj.day}` : proj.day;

        // Custom styling tag classes matching design tokens
        let categoryColor = 'text-primary-fixed-dim bg-primary-fixed-dim/10 border-primary-fixed-dim/20';
        if (proj.category === 'checkout') categoryColor = 'text-secondary-fixed bg-secondary-fixed/10 border-secondary-fixed/20';
        if (proj.category === 'dashboards') categoryColor = 'text-secondary-fixed-dim bg-secondary-fixed-dim/10 border-secondary-fixed-dim/20';
        if (proj.category === 'utilities') categoryColor = 'text-primary bg-primary/10 border-primary/20';
        if (proj.category === 'music') categoryColor = 'text-secondary-container bg-secondary-container/10 border-secondary-container/20';
        if (proj.category === 'pages') categoryColor = 'text-primary-container bg-primary-container/10 border-primary-container/20';
        if (proj.category === 'design') categoryColor = 'text-secondary bg-secondary/10 border-secondary/20';
        if (proj.category === 'profile') categoryColor = 'text-tertiary bg-tertiary/10 border-tertiary/20';
        if (proj.category === 'social') categoryColor = 'text-tertiary-container bg-tertiary-container/10 border-tertiary-container/20';

        card.innerHTML = `
          <!-- Graphic Preview Deck Container -->
          <div class="w-full h-44 rounded-lg bg-surface-container-lowest/80 border border-white/5 relative flex items-center justify-center p-4 overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-t from-surface-dim/40 to-transparent"></div>
            ${getCategoryIcon(proj.category)}
            <!-- Hover Action Overlay -->
            <div class="absolute inset-0 bg-primary-fixed-dim/5 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
              <span class="material-symbols-outlined text-primary-fixed-dim text-3xl drop-shadow-[0_0_8px_rgba(0,219,233,0.5)]">zoom_in</span>
            </div>
          </div>
          <!-- Card Info -->
          <div class="p-4 flex-1 flex flex-col justify-between">
            <div class="mb-4">
              <div class="flex items-center justify-between mb-2">
                <span class="font-label-sm text-label-sm uppercase tracking-wider text-primary-fixed-dim">Day ${paddedDay}</span>
                <span class="text-[10px] font-label-sm uppercase tracking-widest px-2 py-0.5 rounded border ${categoryColor}">${proj.category}</span>
              </div>
              <h3 class="text-body-lg font-headline-md font-semibold text-on-surface group-hover:text-primary-fixed-dim transition-colors m-0 leading-tight">${proj.title}</h3>
            </div>
            <!-- Bottom Specs -->
            <div class="border-t border-white/5 pt-3 flex items-center justify-between text-[11px] text-on-surface-variant/50">
              <span class="truncate pr-2">${proj.tags[0] || 'Interactive'}</span>
              <span class="material-symbols-outlined text-sm font-light">arrow_outward</span>
            </div>
          </div>
        `;
        
        grid.appendChild(card);
      });
    }

    // Expand Card and Display Live Website Frame
    function expandCard(dayNum) {
      activeProjectIndex = filteredProjects.findIndex(p => p.day === dayNum);
      if (activeProjectIndex === -1) return;

      const proj = filteredProjects[activeProjectIndex];
      
      // Update Expanded Stage Texts
      const paddedDay = proj.day < 10 ? `0${proj.day}` : proj.day;
      document.getElementById('stageDayLabel').textContent = `DAY ${paddedDay}`;
      document.getElementById('stageCategoryLabel').textContent = proj.category.toUpperCase();
      document.getElementById('stageTitle').textContent = proj.title;
      document.getElementById('stageTech').textContent = `Tech stack: ${proj.tech}`;
      document.getElementById('stageLiveBtn').setAttribute('href', proj.link);
      
      // Trigger iframe loader screen
      const loader = document.getElementById('iframeLoader');
      loader.style.opacity = '1';
      loader.style.pointerEvents = 'auto';

      // Set iframe source
      document.getElementById('stageIframe').setAttribute('src', proj.link);

      // Open overlay stage
      document.getElementById('expansionStage').classList.add('active');
      document.body.style.overflow = 'hidden'; // prevent background scrolling
    }

    // Hide loading view when iframe completes render
    function hideIframeLoader() {
      const loader = document.getElementById('iframeLoader');
      loader.style.opacity = '0';
      loader.style.pointerEvents = 'none';
    }

    // Close Expanded Viewer
    function closeExpansion() {
      document.getElementById('expansionStage').classList.remove('active');
      document.getElementById('stageIframe').setAttribute('src', 'about:blank');
      document.body.style.overflow = '';
    }

    // Next/Prev navigation
    function navigateProject(offset) {
      if (filteredProjects.length === 0) return;

      let newIndex = activeProjectIndex + offset;
      if (newIndex >= filteredProjects.length) newIndex = 0;
      if (newIndex < 0) newIndex = filteredProjects.length - 1;

      expandCard(filteredProjects[newIndex].day);
    }

    // Filter Logic
    function filterProjects() {
      const query = document.getElementById('searchBar').value.toLowerCase();
      
      filteredProjects = projects.filter(proj => {
        const matchesSearch = proj.title.toLowerCase().includes(query) || 
                              `day ${proj.day}`.includes(query) || 
                              proj.tech.toLowerCase().includes(query) ||
                              proj.tags.some(t => t.toLowerCase().includes(query));
        
        const matchesCategory = currentCategory === 'all' || 
                                proj.category === currentCategory;

        return matchesSearch && matchesCategory;
      });

      renderCardGrid(filteredProjects);
    }

    // Handle Category Tab Change
    function setCategory(event, catName) {
      currentCategory = catName;
      
      // Update Tab highlight states
      const tabs = document.querySelectorAll('.sidebar-tab');
      tabs.forEach(tab => {
        tab.className = "sidebar-tab px-4 py-2 rounded-full text-label-sm font-label-sm uppercase tracking-wider bg-white/5 text-on-surface border border-white/10 hover:bg-white/10 cursor-pointer whitespace-nowrap";
      });

      event.currentTarget.className = "sidebar-tab px-4 py-2 rounded-full text-label-sm font-label-sm uppercase tracking-wider bg-primary-fixed-dim/20 text-primary-fixed-dim border border-primary-fixed-dim/30 cursor-pointer whitespace-nowrap";

      filterProjects();
    }

    // Event listener: Close modal when clicking background overlay outside container
    document.getElementById('expansionStage').addEventListener('click', (e) => {
      if (e.target.id === 'expansionStage') {
        closeExpansion();
      }
    });

    // Event listener: Keyboard arrows/esc navigation in modal
    document.addEventListener('keydown', (e) => {
      const stage = document.getElementById('expansionStage');
      if (!stage.classList.contains('active')) return;

      if (e.key === 'Escape') closeExpansion();
      if (e.key === 'ArrowRight') navigateProject(1);
      if (e.key === 'ArrowLeft') navigateProject(-1);
    });

    // Initialize Card Layout
    window.addEventListener('DOMContentLoaded', () => {
      renderCardGrid(projects);
      // set expansionStage hidden source initially
      document.getElementById('stageIframe').setAttribute('src', 'about:blank');
    });
  </script>
